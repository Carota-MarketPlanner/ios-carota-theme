name: Build And Publish Developer

on:
  push:
    branches: [ "develop" ]

permissions:
      contents: write

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    secrets: inherit

  create-tag:
    name: Creates Tag
    uses: ./.github/workflows/publish-tag.yml
    with: 
      name: ${{ needs.build.outputs.name }}
      version: ${{ needs.build.outputs.version }}-dev
    needs: [build]
    secrets: inherit

  publish:
    name: Publish Developer
    uses: ./.github/workflows/publish-github-developer.yml
    with: 
      name: ${{ needs.create-tag.outputs.name }}
      version: ${{ needs.create-tag.outputs.version }}
    needs: [create-tag]
    secrets: inherit

  update-podspec:
    name: Update Podspec With Developer
    uses: ./.github/workflows/update-podspecs-developer.yml
    with: 
      name: ${{ needs.publish.outputs.name }}
      version: ${{ needs.publish.outputs.version }}
    needs: [publish]
    secrets: inherit
    